<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BullBlack · Reserva de Visitas</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-box">

    <div class="auth-logo">
      <div class="auth-logo-mark">
        <span class="brand-mark">B</span>
        <span>BULL<span class="brand-accent">BLACK</span></span>
      </div>
      <div class="auth-logo-sub">Automatización · Seguridad</div>
    </div>

    <div id="config-warning"></div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" data-tab="login">Iniciar sesión</button>
        <button class="tab" data-tab="register">Registrarse</button>
      </div>

      <div id="alert-box"></div>

      <!-- LOGIN -->
      <form id="login-form" class="tab-panel">
        <div class="field">
          <label class="field-label">Correo o nombre distintivo</label>
          <input type="text" id="login-id" placeholder="edificio-cordillera  o  correo@ejemplo.cl" required autocomplete="username" />
          <div class="field-hint">Puedes ingresar con tu correo o con el nombre que registraste.</div>
        </div>

        <div class="field">
          <label class="field-label">Contraseña</label>
          <input type="password" id="login-pass" placeholder="••••••••" required autocomplete="current-password" />
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="login-btn">Entrar</button>
      </form>

      <!-- REGISTER -->
      <form id="register-form" class="tab-panel hidden">
        <div class="field">
          <label class="field-label">Nombre distintivo</label>
          <input type="text" id="reg-name" placeholder="Ej: Edificio Cordillera · Dpto 402 · Juan Pérez" required />
          <div class="field-hint">Cómo quieres identificarte (edificio, departamento, empresa o persona natural). Debe ser único.</div>
        </div>

        <div class="field">
          <label class="field-label">Correo electrónico</label>
          <input type="email" id="reg-email" placeholder="tu@correo.cl" required autocomplete="email" />
        </div>

        <div class="field">
          <label class="field-label">Contraseña</label>
          <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password" />
        </div>

        <div class="field">
          <label class="field-label">Confirmar contraseña</label>
          <input type="password" id="reg-pass2" placeholder="Repite la contraseña" required minlength="6" autocomplete="new-password" />
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="reg-btn">Crear cuenta</button>
      </form>
    </div>

    <div class="row-between mt-6" style="padding: 0 8px;">
      <span class="text-muted text-sm">Lun–Dom · 07:30 – 20:00</span>
      <button class="btn btn-ghost btn-sm" onclick="diagnosticar()" title="Probar configuración de Firebase">🔧 Diagnóstico</button>
    </div>

    <div id="diag-box" class="hidden mt-4"></div>

  </div>
</div>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="app.js"></script>

<script>
  const tabs       = document.querySelectorAll(".tab");
  const loginForm  = document.getElementById("login-form");
  const regForm    = document.getElementById("register-form");
  const alertBox   = document.getElementById("alert-box");
  const configWarn = document.getElementById("config-warning");
  const diagBox    = document.getElementById("diag-box");

  // Verificar config al cargar
  if (!CONFIG_OK) {
    configWarn.innerHTML = `
      <div class="alert alert-error" style="margin-bottom:16px;">
        <strong>⚠️ Configuración incompleta</strong><br>
        El archivo <code>app.js</code> aún tiene los valores <code>TU_API_KEY</code> etc.
        Debes pegar las credenciales reales de tu proyecto Firebase antes de poder registrar/iniciar sesión.
        Ver <strong>README.md sección 2</strong>.
      </div>`;
  }

  tabs.forEach(t => t.addEventListener("click", () => {
    tabs.forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    limpiarAlerta(alertBox);
    if (t.dataset.tab === "login") {
      loginForm.classList.remove("hidden");
      regForm.classList.add("hidden");
    } else {
      regForm.classList.remove("hidden");
      loginForm.classList.add("hidden");
    }
  }));

  // Si ya está autenticado, redirige
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      console.log("[authstate] usuario detectado:", user.email);
      const profile = await getUserProfileAwait(user.uid);
      if (!profile) {
        console.warn("[authstate] usuario sin perfil en Firestore. Permaneciendo en login.");
        return;
      }
      if (profile.rol === "admin") {
        window.location.href = "admin.html";
      } else {
        window.location.href = "reservar.html";
      }
    }
  });

  // LOGIN
  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    limpiarAlerta(alertBox);
    const btn = document.getElementById("login-btn");
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Entrando...';
    try {
      const id = document.getElementById("login-id").value;
      const pass = document.getElementById("login-pass").value;
      await loginFlexible(id, pass);
    } catch (err) {
      console.error("[login form] error:", err);
      mostrarAlerta(alertBox, err.message || String(err), "error");
      btn.disabled = false; btn.textContent = "Entrar";
    }
  });

  // REGISTER
  regForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    limpiarAlerta(alertBox);
    const btn = document.getElementById("reg-btn");

    const name  = document.getElementById("reg-name").value.trim();
    const email = document.getElementById("reg-email").value.trim();
    const pass  = document.getElementById("reg-pass").value;
    const pass2 = document.getElementById("reg-pass2").value;

    if (pass !== pass2) {
      mostrarAlerta(alertBox, "Las contraseñas no coinciden.", "error");
      return;
    }
    if (name.length < 3) {
      mostrarAlerta(alertBox, "El nombre distintivo debe tener al menos 3 caracteres.", "error");
      return;
    }

    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Creando...';
    try {
      await registrarCliente({ email, password: pass, displayName: name });
      mostrarAlerta(alertBox, "Cuenta creada con éxito. Redirigiendo...", "success");
    } catch (err) {
      console.error("[register form] error:", err);
      mostrarAlerta(alertBox, err.message || String(err), "error");
      btn.disabled = false; btn.textContent = "Crear cuenta";
    }
  });

  // DIAGNÓSTICO
  window.diagnosticar = async function () {
    diagBox.classList.remove("hidden");
    diagBox.innerHTML = '<div class="card"><div class="text-muted"><span class="spinner"></span> Probando configuración...</div></div>';

    const check = [];

    // 1. Config válido
    check.push({
      nombre: "firebaseConfig con credenciales reales",
      ok: CONFIG_OK,
      detalle: CONFIG_OK ? `Project ID: ${firebaseConfig.projectId}` : "Aún tiene valores placeholder (TU_...)"
    });

    // 2. Auth habilitado
    try {
      // Intentamos un sign-in con credenciales falsas; si Auth no está habilitado, da otro código
      await auth.signInWithEmailAndPassword("diagnostico_" + Date.now() + "@test.test", "xxxxxx");
      check.push({ nombre: "Authentication habilitado", ok: true, detalle: "Respondió correctamente" });
    } catch (e) {
      const ok = !["auth/configuration-not-found", "auth/operation-not-allowed", "auth/invalid-api-key", "auth/api-key-not-valid"].includes(e.code);
      let detalle = `Código: ${e.code || "(sin código)"}`;
      if (e.code === "auth/configuration-not-found") detalle += " — Authentication no está habilitado. Ve a Firebase → Authentication → Get started.";
      else if (e.code === "auth/operation-not-allowed") detalle += " — Email/Password no está habilitado. Ve a Authentication → Sign-in method → Email/Password → Enable.";
      else if (e.code === "auth/invalid-api-key" || e.code === "auth/api-key-not-valid") detalle += " — La API key es inválida.";
      else if (e.code === "auth/user-not-found" || e.code === "auth/invalid-credential" || e.code === "auth/wrong-password") detalle = "OK (rechazó credenciales falsas como se esperaba)";
      check.push({ nombre: "Authentication habilitado", ok, detalle });
    }

    // 3. Firestore lectura
    try {
      await db.collection("__diag__").limit(1).get();
      check.push({ nombre: "Firestore lectura", ok: true, detalle: "Base de datos responde" });
    } catch (e) {
      let detalle = `Código: ${e.code || "(sin código)"} — ${e.message}`;
      if (e.code === "permission-denied") detalle = "Reglas bloquean. Copia las reglas del README.";
      else if (e.code === "unavailable" || e.code === "not-found") detalle = "Firestore no está creado. Ve a Firebase → Firestore Database → Create database.";
      check.push({ nombre: "Firestore lectura", ok: false, detalle });
    }

    const rows = check.map(c => `
      <div style="padding:10px 0; border-bottom:1px solid var(--border); display:flex; gap:10px; align-items:flex-start;">
        <span style="font-size:18px; line-height:1;">${c.ok ? "✅" : "❌"}</span>
        <div style="flex:1;">
          <div style="font-weight:600;">${c.nombre}</div>
          <div class="text-muted text-sm" style="font-family:var(--mono); margin-top:2px;">${c.detalle}</div>
        </div>
      </div>
    `).join("");

    diagBox.innerHTML = `
      <div class="card">
        <div class="card-head">
          <div class="card-title">Diagnóstico de configuración</div>
          <div class="card-sub">Abre la consola del navegador (F12) para ver más detalles.</div>
        </div>
        ${rows}
      </div>`;
  };
</script>

</body>
</html>
